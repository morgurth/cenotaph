name: Deploy to GitHub Pages

on:
  # Trigger the deployment automatically on pushes to the main branch
  push:
    branches: ["main"]

  # Allow manual triggering from the Actions tab in GitHub
  workflow_dispatch:

# Set the necessary permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from stepping on each other
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: Upload project files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the root directory (where index.html lives)
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4